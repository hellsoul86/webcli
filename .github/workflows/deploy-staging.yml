name: Deploy Staging

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-staging
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    env:
      STAGING_SSH_HOST: ${{ vars.STAGING_SSH_HOST }}
      STAGING_SSH_USER: ${{ vars.STAGING_SSH_USER }}
      STAGING_REPO_DIR: ${{ vars.STAGING_REPO_DIR }}
      STAGING_SERVICE_INSTANCE: ${{ vars.STAGING_SERVICE_INSTANCE }}
      STAGING_APP_URL: ${{ vars.STAGING_APP_URL }}
      STAGING_API_HEALTH_URL: ${{ vars.STAGING_API_HEALTH_URL }}
    steps:
      - name: Validate staging deploy configuration
        run: |
          set -euo pipefail
          required_vars=(
            STAGING_SSH_HOST
            STAGING_SSH_USER
            STAGING_REPO_DIR
            STAGING_SERVICE_INSTANCE
            STAGING_APP_URL
            STAGING_API_HEALTH_URL
          )
          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing GitHub Actions variable: ${name}" >&2
              exit 1
            fi
          done

          if [[ -z "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" ]]; then
            echo "Missing GitHub Actions secret: STAGING_SSH_PRIVATE_KEY" >&2
            exit 1
          fi

          if [[ -z "${{ secrets.STAGING_SSH_KNOWN_HOSTS }}" ]]; then
            echo "Missing GitHub Actions secret: STAGING_SSH_KNOWN_HOSTS" >&2
            exit 1
          fi

      - name: Install SSH key
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/id_staging
          chmod 600 ~/.ssh/id_staging
          printf '%s\n' "${{ secrets.STAGING_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy main to staging
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_staging "${STAGING_SSH_USER}@${STAGING_SSH_HOST}" <<EOF
          set -euo pipefail
          cd "${STAGING_REPO_DIR}"
          git fetch origin --prune
          git checkout main
          git pull --ff-only
          sudo WEBCLI_STAGING_SERVICE_INSTANCE="${STAGING_SERVICE_INSTANCE}" bash ./deploy/staging/bin/deploy.sh
          EOF

      - name: Verify staging endpoints
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            if curl --fail --silent --show-error --location "${STAGING_API_HEALTH_URL}" >/dev/null \
              && curl --fail --silent --show-error --location --head "${STAGING_APP_URL}" >/dev/null; then
              exit 0
            fi

            if [[ "${attempt}" -eq 12 ]]; then
              echo "Staging endpoints did not become healthy in time." >&2
              exit 1
            fi

            sleep 5
          done

      - name: Publish summary
        env:
          DEPLOY_TRIGGER: ${{ github.event_name }}
          DEPLOY_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
          DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          {
            echo "## Staging Deploy"
            echo
            echo "- Host: \`${STAGING_SSH_HOST}\`"
            echo "- Repo: \`${STAGING_REPO_DIR}\`"
            echo "- App: ${STAGING_APP_URL}"
            echo "- Health: ${STAGING_API_HEALTH_URL}"
            echo "- Trigger: \`${DEPLOY_TRIGGER}\`"
            echo "- Ref: \`${DEPLOY_REF}\`"
            echo "- SHA: \`${DEPLOY_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
