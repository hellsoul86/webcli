map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream webcli_staging_backend {
  server 127.0.0.1:4000;
  keepalive 16;
}

server {
  listen 80;
  listen [::]:80;
  server_name webcli-staging.royding.ai api.webcli-staging.royding.ai;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name webcli-staging.royding.ai;

  ssl_certificate /etc/ssl/certs/webcli-staging-origin.pem;
  ssl_certificate_key /etc/ssl/private/webcli-staging-origin.key;

  root /srv/webcli-staging/current/apps/web/dist;
  index index.html;

  client_max_body_size 25m;

  location /api/ {
    proxy_pass http://webcli_staging_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /ws {
    proxy_pass http://webcli_staging_backend/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.webcli-staging.royding.ai;

  ssl_certificate /etc/ssl/certs/webcli-staging-origin.pem;
  ssl_certificate_key /etc/ssl/private/webcli-staging-origin.key;

  client_max_body_size 25m;

  location /api/ {
    proxy_pass http://webcli_staging_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /ws {
    proxy_pass http://webcli_staging_backend/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  location = /api/health {
    proxy_pass http://webcli_staging_backend/api/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    return 404;
  }
}

